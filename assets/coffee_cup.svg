<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" width="60" height="80" role="img" aria-label="coffee cup">
  <!-- cup body -->
  <path d="M14 30 l32 0 l-5 40 q-1 6 -7 6 l-8 0 q-6 0 -7 -6 z"
        fill="#fff" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
  <!-- green sleeve -->
  <path d="M13 42 l34 0 l-2 16 l-30 0 z" fill="#00704A" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- lid -->
  <rect x="9" y="20" width="42" height="12" rx="5" fill="#fff" stroke="#1a1a1a" stroke-width="3"/>
  <!-- dome -->
  <path d="M18 20 q12 -12 24 0 z" fill="#fff" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
  <!-- steam -->
  <path d="M24 8 q-5 -6 0 -12 M36 8 q5 -6 0 -12" fill="none" stroke="#9ec9b8" stroke-width="2.5" stroke-linecap="round"/>
</svg>
